x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_stream
  REDIS_URL: redis://redis:6379
  HEALTH_CHECK_KAFKA: "false"
  DEEPSTREAM_REST_URL: http://deepstream:9000
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_DETECTION_TOPIC: deepstream-detections
  KAFKA_EVENT_TOPIC: deepstream-events
  KAFKA_COMMAND_TOPIC: deepstream-commands
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}

services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ai_stream
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Backend ----
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      target: production
    command: celery -A config worker -l info --concurrency=4
    environment:
      <<: *backend-env
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      disable: true

  celery-beat:
    build:
      context: ./backend
      target: production
    command: celery -A config beat -l info
    environment:
      <<: *backend-env
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      disable: true

  kafka-consumer:
    build:
      context: ./backend
      target: production
    command: python manage.py run_kafka_consumer
    environment:
      <<: *backend-env
      HEALTH_CHECK_KAFKA: "true"
    depends_on:
      - backend
      - kafka
    restart: always
    stop_grace_period: 30s
    healthcheck:
      disable: true

  backend-test:
    build:
      context: ./backend
      target: test
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_stream_test
      REDIS_URL: redis://redis:6379
      DEEPSTREAM_REST_URL: http://deepstream:9000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HEALTH_CHECK_KAFKA: "false"
      SECRET_KEY: test-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

  # ---- DeepStream ----
  deepstream:
    build:
      context: ./deepstream
    ports:
      - "9000:9000"
      - "8554:8554"
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: deepstream-detections
      KAFKA_EVENT_TOPIC: deepstream-events
      KAFKA_COMMAND_TOPIC: deepstream-commands
    depends_on:
      - kafka
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  pgdata:
  frontend_node_modules:
