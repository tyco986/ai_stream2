x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.production
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_stream
  REDIS_URL: redis://redis:6379
  HEALTH_CHECK_KAFKA: "false"
  DEEPSTREAM_REST_URL: http://deepstream:9000
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_DETECTION_TOPIC: deepstream-detections
  KAFKA_EVENT_TOPIC: deepstream-events
  KAFKA_COMMAND_TOPIC: deepstream-commands
  SECRET_KEY: ${SECRET_KEY:-change-me-in-production}

services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ai_stream
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  kafka:
    image: docker.redpanda.com/redpandadata/redpanda:v24.1.9
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://kafka:9092,external://localhost:19092
      - --mode dev-container
      - --smp 1
    ports:
      - "19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy.*true'"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Backend ----
  backend:
    build:
      context: ./backend
      target: production
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: ./backend
      target: production
    command: celery -A config worker -l info --concurrency=4
    environment:
      <<: *backend-env
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      disable: true

  celery-beat:
    build:
      context: ./backend
      target: production
    command: celery -A config beat -l info
    environment:
      <<: *backend-env
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      disable: true

  kafka-consumer:
    build:
      context: ./backend
      target: production
    command: python manage.py run_kafka_consumer
    environment:
      <<: *backend-env
      HEALTH_CHECK_KAFKA: "true"
    depends_on:
      - backend
      - kafka
    restart: always
    stop_grace_period: 30s
    healthcheck:
      disable: true

  backend-test:
    build:
      context: ./backend
      target: test
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.development
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_stream_test
      REDIS_URL: redis://redis:6379
      DEEPSTREAM_REST_URL: http://deepstream:9000
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      HEALTH_CHECK_KAFKA: "false"
      SECRET_KEY: test-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

  # ---- DeepStream ----
  deepstream:
    build:
      context: ./deepstream
    ports:
      - "9000:9000"
      - "8554:8554"
      - "8889:8889"
    environment:
      KAFKA_BROKER: kafka:9092
      KAFKA_TOPIC: deepstream-detections
      KAFKA_EVENT_TOPIC: deepstream-events
      KAFKA_COMMAND_TOPIC: deepstream-commands
      DS_RECORDING_SEGMENT_SEC: ${DS_RECORDING_SEGMENT_SEC:-300}
      DS_SR_DEFAULT_DURATION: ${DS_SR_DEFAULT_DURATION:-300}
      DS_LIGHT_PIPELINE: ${DS_LIGHT_PIPELINE:-1}
      DS_PGIE_CONFIG: ${DS_PGIE_CONFIG:-/app/config/pgie_yolov10_config.yml}
      DS_YOLO_PERSON_ONLY: ${DS_YOLO_PERSON_ONLY:-1}
      DS_YOLO_THRESHOLD: ${DS_YOLO_THRESHOLD:-0.3}
      DS_LABELS_PATH: /app/models/coco_labels.txt
    volumes:
      - ./deepstream/screenshots:/app/screenshots
      - ./deepstream/recordings:/app/recordings
      - ./deepstream/models:/app/models
    depends_on:
      - kafka
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # ---- Frontend ----
  frontend:
    build:
      context: ./frontend
      target: dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    restart: unless-stopped

volumes:
  pgdata:
  frontend_node_modules:
