x-backend-env: &backend-env
  DJANGO_SETTINGS_MODULE: config.settings.development
  DATABASE_URL: postgres://postgres:postgres@postgres:5432/ai_stream
  REDIS_URL: redis://redis:6379
  HEALTH_CHECK_KAFKA: "false"
  DEEPSTREAM_MOCK: "true"
  KAFKA_BOOTSTRAP_SERVERS: kafka:9092
  KAFKA_DETECTION_TOPIC: deepstream-detections
  KAFKA_EVENT_TOPIC: deepstream-events
  KAFKA_COMMAND_TOPIC: deepstream-commands
  SECRET_KEY: dev-insecure-secret-key

services:
  # ---- Infrastructure ----
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: ai_stream
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      retries: 5

  kafka:
    image: bitnami/kafka:3.7
    environment:
      KAFKA_CFG_NODE_ID: 1
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    ports:
      - "9092:9092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Backend Services ----
  backend:
    build:
      context: .
      target: dev
    ports:
      - "8000:8000"
    environment:
      <<: *backend-env
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  celery-worker:
    build:
      context: .
      target: dev
    command: celery -A config worker -l info --concurrency=2
    environment:
      <<: *backend-env
    volumes:
      - .:/app
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      disable: true

  celery-beat:
    build:
      context: .
      target: dev
    command: celery -A config beat -l info
    environment:
      <<: *backend-env
    volumes:
      - .:/app
    depends_on:
      - backend
    restart: unless-stopped
    healthcheck:
      disable: true

  kafka-consumer:
    build:
      context: .
      target: dev
    command: python manage.py run_kafka_consumer
    environment:
      <<: *backend-env
      HEALTH_CHECK_KAFKA: "true"
    volumes:
      - .:/app
    depends_on:
      - backend
      - kafka
    restart: always
    stop_grace_period: 30s
    healthcheck:
      disable: true

  # ---- Test runner (on-demand) ----
  test:
    build:
      context: .
      target: test
    environment:
      <<: *backend-env
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/test_ai_stream
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  pgdata:
